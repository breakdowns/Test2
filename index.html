<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Web Player</title>
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- File CSS Utama -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tambahan style khusus untuk watermark Hafitz */
        .watermark {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 20px;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .watermark:hover {
            color: var(--spotify-green);
        }
    </style>
</head>
<body>

    <div class="player-container">
        <!-- 1. Gambar Cover Album -->
        <div class="cover-wrapper">
            <img id="trackCover" src="https://via.placeholder.com/300" alt="Cover Album">
        </div>

        <!-- 2. Informasi Lagu & Tombol Favorit -->
        <div class="track-header">
            <div class="track-info">
                <!-- Wrapper Khusus Animasi Judul Panjang Berjalan -->
                <div class="marquee-container">
                    <h2 id="trackTitle">Memuat Judul...</h2>
                </div>
                <p id="trackArtist">Memuat Artis...</p>
            </div>
            <button id="favoriteBtn" class="btn-fav">
                <span class="material-icons">favorite_border</span>
            </button>
        </div>

        <!-- 3. Progress Durasi Lagu -->
        <div class="progress-area">
            <div id="progressContainer" class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <!-- 4. Kontrol Musik (Shuffle, Prev, Play/Pause, Next, Repeat) -->
        <div class="controls-area">
            <button id="shuffleBtn" class="btn-control">
                <span class="material-icons">shuffle</span>
            </button>
            <button id="prevBtn" class="btn-control">
                <span class="material-icons">skip_previous</span>
            </button>
            <button id="playBtn" class="btn-control btn-play-pause">
                <span id="playIcon" class="material-icons" style="font-size: 2.2rem;">play_arrow</span>
            </button>
            <button id="nextBtn" class="btn-control">
                <span class="material-icons">skip_next</span>
            </button>
            <button id="repeatBtn" class="btn-control">
                <span class="material-icons">repeat</span>
            </button>
        </div>

        <!-- 5. Kontrol Volume Suara -->
        <div class="volume-area">
            <span class="material-icons" style="font-size: 1.2rem;">volume_down</span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">
            <span class="material-icons" style="font-size: 1.2rem;">volume_up</span>
        </div>

        <!-- 6. Canvas Efek Audio Visualizer -->
        <div class="visualizer-container">
            <canvas id="visualizer"></canvas>
        </div>

        <!-- 7. Panel Teks Lirik Otomatis -->
        <div id="lyricsContainer" class="lyrics-container">
            <div id="lyricsWrapper"></div>
        </div>

        <!-- 8. Kotak Pencarian & Daftar Putar Lagu -->
        <input type="text" id="searchBar" class="search-box" placeholder="Cari lagu atau artis...">
        <div id="playlist" class="playlist-container">
            <!-- Daftar lagu akan dirender otomatis oleh JS -->
        </div>

        <!-- 9. Watermark Kredit Pembuat -->
        <div class="watermark">
            Made with ♥️ by Hafitz
        </div>
    </div>

    <!-- Audio Element Utama -->
    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <!-- File JavaScript (Dibagi dua agar aman dan tidak gampang terpotong sistem) -->
    <script src="app.js"></script>
    <script src="media.js"></script>
</body>
</html>
