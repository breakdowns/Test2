<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Music</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <audio id="mainAudio"></audio>
    <div class="player-card">
        <div class="cover-container">
            <img id="trackCover" src="" alt="Cover">
            <canvas id="visualizer"></canvas>
        </div>
        <div class="track-info">
            <h2 id="trackTitle">Judul Lagu</h2>
            <p id="trackArtist">Artis</p>
        </div>
        <div class="progress-section">
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-stamps">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
        <div class="controls-main">
            <button class="btn-icon" id="prevBtn"><span class="material-icons">skip_previous</span></button>
            <button class="btn-icon" id="playBtn"><span class="material-icons" id="playIcon">play_arrow</span></button>
            <button class="btn-icon" id="nextBtn"><span class="material-icons">skip_next</span></button>
        </div>
        <div class="controls-utility-row">
            <button class="btn-small" id="shuffleBtn"><span class="material-icons">shuffle</span></button>
            <button class="btn-small" id="repeatBtn"><span class="material-icons">repeat</span></button>
            <button class="btn-small" id="favoriteBtn"><span class="material-icons">favorite_border</span></button>
            <div class="volume-inline-container">
                <span class="material-icons" style="font-size:18px; color:var(--text-muted)">volume_up</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
            </div>
        </div>
        <div class="lyrics-container" id="lyricsContainer">
            <div id="lyricsWrapper"></div>
        </div>
        <input type="text" id="searchBar" placeholder="Cari judul lagu atau musisi...">
        <div id="playlist"></div>
    </div>
    <script src="app.js"></script>
    <script src="media.js"></script>
</body>
    </html>
