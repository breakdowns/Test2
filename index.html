<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Music</title>
    <!-- Material Icons & Google Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Blur luar -->
    <div class="bg-blur" id="bgBlur"></div>

    <div class="container">
        <!-- PLAYER CARD (Sesuai Gambar Referensi) -->
        <div class="player-card">
            
            <!-- Album Art Kotak Agak Miring Khas Gambar -->
            <div class="cover-container">
                <img src="placeholder.jpg" alt="Cover" id="trackCover" class="track-cover">
                <canvas id="visualizer" class="visualizer-canvas"></canvas>
            </div>

            <!-- Metadata Info -->
            <div class="track-meta">
                <h1 id="trackTitle">test</h1>
                <p id="trackArtist">Breakdown</p>
            </div>

            <!-- Progress Bar Timeline Utama -->
            <div class="progress-section">
                <div class="progress-bar-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:14</span>
                    <span id="duration">0:55</span>
                </div>
            </div>

            <!-- Main Controls (Tombol Bulat Hijau) -->
            <div class="main-controls">
                <button id="prevBtn" class="btn-round btn-side"><span class="material-icons">skip_previous</span></button>
                <button id="playBtn" class="btn-round btn-center glow-active"><span class="material-icons">pause</span></button>
                <button id="nextBtn" class="btn-round btn-side"><span class="material-icons">skip_next</span></button>
            </div>

            <!-- Bottom Row Utility (Shuffle, Fav, Repeat, Volume) -->
            <div class="bottom-utility">
                <button id="shuffleBtn" class="btn-util toggle-btn active"><span class="material-icons">shuffle</span></button>
                <button id="favBtn" class="btn-util"><span class="material-icons">favorite</span></button>
                <button id="repeatBtn" class="btn-util toggle-btn active"><span class="material-icons">repeat</span></button>
                
                <div class="volume-box">
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
                </div>
            </div>
        </div>

        <!-- PLAYLIST DI BAWAH CARD -->
        <div class="playlist-section">
            <div class="playlist-header">
                <div class="search-box">
                    <span class="material-icons">search</span>
                    <input type="text" id="searchBar" placeholder="Cari lagu...">
                </div>
                <button id="sortAZ" class="btn-sort"><span class="material-icons">sort_by_alpha</span></button>
            </div>
            <div class="playlist-container" id="playlist">
                <!-- List lagu di-render disini -->
            </div>
        </div>
    </div>

    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof initAudioVisualizer === 'function') initAudioVisualizer();
            if (typeof fetchPlaylist === 'function') fetchPlaylist();
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
