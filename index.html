<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Music</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="player-card">
        <div class="cover-container">
            <img id="trackCover" src="cover1.jpg" alt="Cover Album">
        </div>
        <div class="track-info">
            <h2 id="trackTitle">Memuat...</h2>
            <p id="trackArtist">-</p>
        </div>
        <div class="progress-section">
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-stamps">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
        <div class="controls-main">
            <div class="btn-icon" id="prevBtn"><span class="material-icons">skip_previous</span></div>
            <div class="btn-icon" id="playBtn"><span class="material-icons" id="playIcon">play_arrow</span></div>
            <div class="btn-icon" id="nextBtn"><span class="material-icons">skip_next</span></div>
        </div>
        <div class="controls-utility-row">
            <div class="btn-icon btn-small"><span class="material-icons">shuffle</span></div>
            <div class="btn-icon btn-small"><span class="material-icons">repeat</span></div>
            <div class="volume-inline-container">
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
            </div>
        </div>
        <div id="playlist"></div>
    </div>
    <footer class="footer-credit">
        Build with ♥️ by <a href="https://hafitz.eu.org" target="_blank">Hafitz</a>
    </footer>
    <audio id="mainAudio"></audio>
    <script src="app.js"></script>
</body>
</html>
