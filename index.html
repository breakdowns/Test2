<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Music</title>
    <!-- Material Icons & Google Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blur" id="bgBlur"></div>

    <div class="container">
        <!-- PLAYER CARD -->
        <div class="player-card">
            
            <div class="cover-container">
                <img src="placeholder.jpg" alt="Cover" id="trackCover" class="track-cover">
                <canvas id="visualizer" class="visualizer-canvas"></canvas>
            </div>

            <div class="track-meta">
                <h1 id="trackTitle">Memuat lagu...</h1>
                <p id="trackArtist">Artis</p>
            </div>

            <div class="progress-section">
                <div class="progress-bar-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <!-- Mengubah default icon awal menjadi play_arrow murni vector -->
            <div class="main-controls">
                <button id="prevBtn" class="btn-round btn-side"><span class="material-icons">skip_previous</span></button>
                <button id="playBtn" class="btn-round btn-center"><span class="material-icons">play_arrow</span></button>
                <button id="nextBtn" class="btn-round btn-side"><span class="material-icons">skip_next</span></button>
            </div>

            <div class="bottom-utility">
                <button id="shuffleBtn" class="btn-util toggle-btn"><span class="material-icons">shuffle</span></button>
                <button id="favBtn" class="btn-util"><span class="material-icons">favorite_border</span></button>
                <button id="repeatBtn" class="btn-util toggle-btn"><span class="material-icons">repeat</span></button>
                
                <div class="volume-box">
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
                </div>
            </div>
        </div>

        <!-- PLAYLIST SECTION -->
        <div class="playlist-section">
            <div class="playlist-header">
                <div class="search-box">
                    <span class="material-icons">search</span>
                    <input type="text" id="searchBar" placeholder="Cari lagu...">
                </div>
                <button id="sortAZ" class="btn-sort"><span class="material-icons">sort_by_alpha</span></button>
            </div>
            <div class="playlist-container" id="playlist"></div>
        </div>
    </div>

    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof initAudioVisualizer === 'function') initAudioVisualizer();
            if (typeof fetchPlaylist === 'function') fetchPlaylist();
        });
    </script>
    <script src="app.js"></script>
</body>
                                                                                                            </html>
