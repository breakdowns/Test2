<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Music</title>
    
    <!-- Favicon Logo Website -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/breakdowns/website/refs/heads/master/images/logo.png">
    
    <!-- Menggunakan cache buster v=4 untuk memaksa browser memuat pembaruan terbaru -->
    <link rel="stylesheet" href="style.css?v=4">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div class="player-card">
        <div class="cover-container">
            <img id="trackCover" src="" alt="Cover Album">
        </div>
        
        <div class="track-info">
            <h2 id="trackTitle">Memuat...</h2>
            <p id="trackArtist">-</p>
        </div>

        <div class="progress-section">
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-stamps">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <!-- BARU: Canvas untuk Audio Visualizer (Gelombang Suara) -->
        <canvas id="visualizer"></canvas>

        <div class="controls-main">
            <button class="btn-icon" id="prevBtn"><span class="material-icons">skip_previous</span></button>
            <button class="btn-icon" id="playBtn"><span class="material-icons" id="playIcon">play_arrow</span></button>
            <button class="btn-icon" id="nextBtn"><span class="material-icons">skip_next</span></button>
        </div>

        <div class="controls-utility-row">
            <button class="btn-icon btn-small" id="shuffleBtn"><span class="material-icons">shuffle</span></button>
            <button class="btn-icon btn-small" id="repeatBtn"><span class="material-icons">repeat</span></button>
            <div class="volume-inline-container">
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
            </div>
        </div>

        <!-- BARU: Container Lirik Berjalan (Auto-Hide secara bawaan) -->
        <div id="lyricsContainer" class="lyrics-container">
            <div id="lyricsWrapper"></div>
        </div>

        <!-- BARU: Search Bar Input di Atas Playlist -->
        <input type="text" id="searchBar" placeholder="Cari judul lagu atau musisi...">

        <div id="playlist"></div>
    </div>

    <footer class="footer-credit">
        Build with ♥️ by <a href="https://hafitz.eu.org" target="_blank">Hafitz</a>
    </footer>

    <audio id="mainAudio"></audio>
    <script src="app.js?v=4"></script>
</body>
                                                                                  </html>
