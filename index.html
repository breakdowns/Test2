<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Music</title>
    <!-- Material Icons & Google Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Dynamic Blurred Background -->
    <div class="bg-blur" id="bgBlur"></div>
    <div class="bg-overlay"></div>

    <!-- Main Container -->
    <div class="container">
        
        <!-- PLAYER CARD (SATU LAYAR PENUH DI ATAS) -->
        <div class="main-player">
            <!-- Header Kecil Khas Spotify -->
            <div class="player-header">
                <span class="material-icons">keyboard_arrow_down</span>
                <span class="header-title">PLAYING FROM PLAYLIST</span>
                <span class="material-icons">more_vert</span>
            </div>

            <!-- Album Art Besar -->
            <div class="cover-wrapper">
                <img src="placeholder.jpg" alt="Cover Album" id="trackCover" class="track-cover">
                <canvas id="visualizer" class="visualizer-canvas"></canvas>
            </div>

            <!-- Track Info (Teks Kiri, Fav Kanan) -->
            <div class="track-info">
                <div class="title-wrapper">
                    <h1 id="trackTitle">Memuat lagu...</h1>
                    <p id="trackArtist">Artis</p>
                </div>
                <button id="favBtn" class="btn-fav">
                    <span class="material-icons">favorite_border</span>
                </button>
            </div>

            <!-- Progress Bar Area -->
            <div class="progress-area">
                <div class="progress-bar-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-knob"></div>
                    </div>
                </div>
                <div class="time-display">
                    <span id="currentTime">00:00</span>
                    <span id="duration">00:00</span>
                </div>
            </div>

            <!-- Playback Controls (Susunan Tombol Spotify) -->
            <div class="controls-area">
                <button id="shuffleBtn" class="btn-control toggle-btn" title="Shuffle">
                    <span class="material-icons">shuffle</span>
                </button>
                <button id="prevBtn" class="btn-control icon-large" title="Sebelumnya">
                    <span class="material-icons">skip_previous</span>
                </button>
                <button id="playBtn" class="btn-control btn-main" title="Putar">
                    <span class="material-icons">play_circle_filled</span>
                </button>
                <button id="nextBtn" class="btn-control icon-large" title="Selanjutnya">
                    <span class="material-icons">skip_next</span>
                </button>
                <button id="repeatBtn" class="btn-control toggle-btn" title="Repeat Mode">
                    <span class="material-icons">repeat</span>
                </button>
            </div>

            <!-- Volume & Speed (Ramping di Bawah Kontrol Utama) -->
            <div class="extra-controls">
                <div class="volume-container">
                    <span class="material-icons" id="volumeIcon">volume_up</span>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
                </div>
                <div class="speed-container">
                    <span class="material-icons">speed</span>
                    <select id="speedSelect">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2.0x</option>
                    </select>
                </div>
            </div>

            <!-- Hint Indikator Scroll Ke Bawah -->
            <div class="scroll-hint">
                <p>Scroll ke bawah untuk melihat playlist</p>
                <span class="material-icons">expand_more</span>
            </div>
        </div>

        <!-- PLAYLIST SECTION (MUNCUL SAAT DI-SCROLL) -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Daftar Lagu</h3>
                <div class="search-box">
                    <span class="material-icons">search</span>
                    <input type="text" id="searchBar" placeholder="Cari di dalam playlist...">
                </div>
                <button id="sortAZ" class="btn-sm"><span class="material-icons">sort_by_alpha</span></button>
            </div>
            
            <div class="playlist-container" id="playlist">
                <!-- Lagu di-render di sini via JavaScript -->
            </div>
        </div>

    </div>

    <!-- Audio Element Hidden -->
    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof initAudioVisualizer === 'function') initAudioVisualizer();
            if (typeof fetchPlaylist === 'function') fetchPlaylist();
        });
    </script>
    <script src="app.js"></script>
</body>
                </html>
