<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Breakdowns Music</title>
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Link File CSS External -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-container">
        <!-- COVER ALBUM & LAYOVER VISUALIZER -->
        <div class="cover-wrapper">
            <img id="trackCover" src="" alt="Cover Album">
            <canvas id="visualizer"></canvas>
        </div>

        <!-- DETIL INFORMASI TRACK & TOMBOL FAVORIT -->
        <div class="track-header">
            <div class="track-info">
                <div class="marquee-container">
                    <h2 id="trackTitle">Memuat Judul...</h2>
                </div>
                <p id="trackArtist">Memuat Artis...</p>
            </div>
            <button id="favoriteBtn" class="btn-fav">
                <span class="material-icons">favorite_border</span>
            </button>
        </div>

        <!-- PROGRESS TIMELINE BAR -->
        <div class="progress-area">
            <div id="progressContainer" class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <!-- CONTROLS PLAYER UTAMA -->
        <div class="controls-area">
            <button id="shuffleBtn" class="btn-control">
                <span class="material-icons">shuffle</span>
            </button>
            <button id="prevBtn" class="btn-control">
                <span class="material-icons">skip_previous</span>
            </button>
            <button id="playBtn" class="btn-play-pause">
                <span id="playIcon" class="material-icons">play_arrow</span>
            </button>
            <button id="nextBtn" class="btn-control">
                <span class="material-icons">skip_next</span>
            </button>
            <button id="repeatBtn" class="btn-control">
                <span class="material-icons">repeat</span>
            </button>
        </div>

        <!-- PENGATUR VOLUME SUARA -->
        <div class="volume-area">
            <span class="material-icons" style="font-size: 1.2rem;">volume_down</span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">
            <span class="material-icons" style="font-size: 1.2rem;">volume_up</span>
        </div>

        <!-- WIDGET INTEGRASI LIRIK (NATIVE ISOLATED LOADER) -->
        <div id="lyricsContainer" class="lyrics-container">
            <!-- Elemen loader kaku yang memblokir interaksi gestur jari -->
            <div id="globalLoader" class="lyrics-loader" style="display: none;">
                <div class="spinner"></div>
                <p>Memuat musik...</p>
            </div>
            <!-- Wadah utama teks lirik lagu -->
            <div id="lyricsWrapper"></div>
        </div>

        <!-- KOTAK PENCARIAN TRACK -->
        <input type="text" id="searchBar" class="search-box" placeholder="Cari lagu atau artis...">

        <!-- DAFTAR PUTAR / PLAYLIST TRACKS -->
        <div id="playlist" class="playlist-container"></div>

        <!-- WATERMARK HAK CIPTA -->
        <div class="watermark">
            Made with 💚 by <a href="#" target="_blank">Hafitz</a>
        </div>
    </div>

    <!-- ELEMEN AUDIO CORE (HIDDEN) -->
    <audio id="mainAudio"></audio>

    <!-- Link File Logic JavaScript External -->
    <script src="app.js"></script>
</body>
                </html>
