<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Music</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <audio id="mainAudio"></audio>

    <div class="player-container">
        <!-- Bagian Atas: Info Lagu & Cover -->
        <div class="track-card">
            <div class="cover-wrapper">
                <img id="trackCover" src="" alt="Cover Album">
            </div>
            <div class="track-info">
                <div class="marquee-container">
                    <h2 id="trackTitle">Memuat Judul...</h2>
                </div>
                <p id="trackArtist">Memuat Artis...</p>
            </div>
        </div>

        <!-- Bagian Tengah: Lirik Lagu -->
        <div id="lyricsContainer" class="lyrics-container">
            <div id="lyricsWrapper" class="lyrics-wrapper"></div>
        </div>

        <!-- Bagian Kendali: Progress Bar & Tombol -->
        <div class="controls-container">
            <div id="progressContainer" class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>

            <div class="playback-buttons">
                <button id="shuffleBtn" class="control-btn">
                    <span class="material-icons">shuffle</span>
                </button>
                <button id="prevBtn" class="control-btn">
                    <span class="material-icons">skip_previous</span>
                </button>
                <button id="playBtn" class="control-btn play-main">
                    <span id="playIcon" class="material-icons">play_arrow</span>
                </button>
                <button id="nextBtn" class="control-btn">
                    <span class="material-icons">skip_next</span>
                </button>
                <button id="repeatBtn" class="control-btn">
                    <span class="material-icons">repeat</span>
                </button>
            </div>

            <!-- Slider Volume -->
            <div class="volume-container">
                <span class="material-icons">volume_down</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
                <span class="material-icons">volume_up</span>
            </div>
        </div>

        <!-- Bagian Bawah: Playlist & Pencarian -->
        <div class="playlist-section">
            <div class="playlist-header">
                <h3>Daftar Lagu</h3>
            </div>
            
            <div class="search-container">
                <span class="material-icons search-icon">search</span>
                <input type="text" id="searchBar" placeholder="Cari judul lagu atau artis...">
            </div>

            <div id="playlist" class="playlist-container-list"></div>
        </div>

        <!-- Footer -->
        <footer style="text-align: center; margin-top: 20px; padding: 10px; color: var(--text-muted); font-size: 0.8rem;">
            <p>Made with ♥️ by Hafitz</p>
        </footer>
    </div>

    <script src="media.js"></script>
    <script src="app.js"></script>
</body>
</html>
