<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeStream - Premium Music Player</title>
    <!-- Material Icons & Google Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" id="manifest-placeholder">
</head>
<body>
    <!-- Dynamic Blurred Background -->
    <div class="bg-blur" id="bgBlur"></div>
    <div class="animated-gradient"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Sidebar / Playlist Section -->
        <div class="sidebar panel">
            <div class="sidebar-header">
                <h2>🎼 My Library</h2>
                <div class="search-box">
                    <span class="material-icons">search</span>
                    <input type="text" id="searchBar" placeholder="Cari lagu, artis...">
                </div>
            </div>
            
            <div class="sort-controls">
                <button id="sortAZ" class="btn-sm"><span class="material-icons">sort_by_alpha</span> A-Z</button>
                <button id="sortNew" class="btn-sm"><span class="material-icons">new_releases</span> Terbaru</button>
            </div>

            <div class="playlist-container" id="playlist">
                <!-- Lagu akan di-render via JavaScript -->
            </div>
        </div>

        <!-- Player Center Section -->
        <div class="main-player panel">
            <!-- PWA Install Button -->
            <button id="pwaInstall" class="btn-pwa hidden">
                <span class="material-icons">download</span> Pasang Aplikasi
            </button>

            <!-- Album Art Zone -->
            <div class="cover-wrapper">
                <img src="placeholder.jpg" alt="Cover Album" id="trackCover" class="track-cover">
                <!-- Audio Visualizer Overlay -->
                <canvas id="visualizer" class="visualizer-canvas"></canvas>
            </div>

            <!-- Track Info -->
            <div class="track-info">
                <div class="title-wrapper">
                    <h1 id="trackTitle">Pilih Lagu</h1>
                    <p id="trackArtist">Artis</p>
                </div>
                <button id="favBtn" class="btn-fav">
                    <span class="material-icons">favorite_border</span>
                </button>
            </div>

            <!-- Lyrics Sync View -->
            <div class="lyrics-container" id="lyricsBox">
                <p class="lyric-line active">Lirik otomatis sinkronisasi...</p>
            </div>

            <!-- Progress Bar Area -->
            <div class="progress-area">
                <div class="time-display">
                    <span id="currentTime">00:00</span>
                    <span id="duration">00:00</span>
                </div>
                <div class="progress-bar-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-knob"></div>
                    </div>
                </div>
            </div>

            <!-- Playback Controls -->
            <div class="controls-area">
                <button id="shuffleBtn" class="btn-control toggle-btn" title="Shuffle">
                    <span class="material-icons">shuffle</span>
                </button>
                <button id="prevBtn" class="btn-control" title="Sebelumnya">
                    <span class="material-icons">skip_previous</span>
                </button>
                <button id="playBtn" class="btn-control btn-main" title="Putar">
                    <span class="material-icons">play_arrow</span>
                </button>
                <button id="nextBtn" class="btn-control" title="Selanjutnya">
                    <span class="material-icons">skip_next</span>
                </button>
                <button id="repeatBtn" class="btn-control toggle-btn" title="Repeat Mode">
                    <span class="material-icons">repeat</span>
                </button>
            </div>

            <!-- Audio Extra Utilities -->
            <div class="extra-controls">
                <div class="volume-container">
                    <span class="material-icons" id="volumeIcon">volume_up</span>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
                </div>
                <div class="speed-container">
                    <span class="material-icons">speed</span>
                    <select id="speedSelect">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2.0x</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Element Hidden -->
    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <!-- Start Overlay Modal -->
    <div class="start-modal" id="startModal">
        <div class="modal-content">
            <h1>VibeStream</h1>
            <p>Selamat datang di pemutar musik modern kamu.</p>
            <button id="startAppBtn" class="btn-start">Mulai Mendengarkan</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
          </html>
