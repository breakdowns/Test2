<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Music</title>
    <!-- Favicon Baru dari GitHub -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/breakdowns/website/refs/heads/master/images/logo.png">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-container">
        
        <!-- BAGIAN 1: COVER LAGU & KANVAS VISUALIZER -->
        <div class="cover-wrapper">
            <img id="trackCover" src="" alt="Cover Lagu">
            <canvas id="visualizer"></canvas>
        </div>

        <!-- BAGIAN 2: INFORMASI JUDUL & TOMBOL FAVORIT -->
        <div class="track-header">
            <div class="track-info">
                <div class="marquee-container">
                    <h2 id="trackTitle">-</h2>
                </div>
                <p id="trackArtist">-</p>
            </div>
            <button id="favoriteBtn" class="btn-fav">
                <span class="material-icons">favorite_border</span>
            </button>
        </div>

        <!-- BAGIAN 3: PROGRESS BAR -->
        <div class="progress-area">
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <!-- BAGIAN 4: TOMBOL NAVIGASI UTAMA -->
        <div class="controls-area">
            <button id="shuffleBtn" class="btn-control">
                <span class="material-icons">shuffle</span>
            </button>
            <button id="prevBtn" class="btn-control">
                <span class="material-icons">skip_previous</span>
            </button>
            <button id="playBtn" class="btn-play-pause">
                <span id="playIcon" class="material-icons">play_arrow</span>
            </button>
            <button id="nextBtn" class="btn-control">
                <span class="material-icons">skip_next</span>
            </button>
            <button id="repeatBtn" class="btn-control">
                <span class="material-icons">repeat</span>
            </button>
        </div>

        <!-- BAGIAN 5: KONTROL VOLUME -->
        <div class="volume-area">
            <span class="material-icons" style="font-size: 1.2rem;">volume_down</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" class="volume-slider">
            <span class="material-icons" style="font-size: 1.2rem;">volume_up</span>
        </div>

        <!-- BAGIAN 6: WADAH LIRIK DINAMIS -->
        <div id="lyricsContainer" class="lyrics-container">
            <div id="lyricsWrapper"></div>
        </div>

        <!-- BAGIAN 7: SEARCH BAR & DAFTAR PLAYLIST -->
        <input type="text" id="searchBar" class="search-box" placeholder="Cari lagu atau artis...">
        <div id="playlist" class="playlist-container"></div>

        <!-- BAGIAN 8: WATERMARK HAFITZ -->
        <div class="watermark">
            Made with <span style="color: #e91e63;">❤️</span> by <a href="#" target="_blank">Hafitz</a>
        </div>

    </div>

    <!-- ELEMEN AUDIO TERSEMBUNYI -->
    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <!-- HUBUNGKAN KEMBALI MEDIA SESSION API DAN APP.JS -->
    <script src="media.js"></script>
    <script src="app.js"></script>
</body>
                </html>
