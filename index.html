<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakdowns Music</title>
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-blur" id="bgBlur"></div>

    <div class="player-card">
        <!-- Cover Art & Visualizer Canvas -->
        <div class="cover-container">
            <img id="trackCover" src="placeholder.jpg" alt="Cover Album">
            <canvas id="visualizer"></canvas>
        </div>

        <!-- Track Meta Data -->
        <div class="track-info">
            <h2 id="trackTitle">Judul Lagu</h2>
            <p id="trackArtist">Nama Artis</p>
        </div>

        <!-- Progress Timeline & Durasi -->
        <div class="progress-section">
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-stamps">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <!-- Player Controller Buttons -->
        <div class="controls-main">
            <div class="btn-icon" id="prevBtn" role="button" tabindex="0">
                <span class="material-icons">skip_previous</span>
            </div>
            <div class="btn-icon" id="playBtn" role="button" tabindex="0">
                <span class="material-icons" id="playIcon">play_arrow</span>
            </div>
            <div class="btn-icon" id="nextBtn" role="button" tabindex="0">
                <span class="material-icons">skip_next</span>
            </div>
        </div>

        <!-- Utility & Volume Section (Satu Baris Sesuai SS Kedua) -->
        <div class="controls-utility-row">
            <div class="utility-buttons">
                <div class="btn-icon btn-small" id="shuffleBtn" role="button" tabindex="0">
                    <span class="material-icons">shuffle</span>
                </div>
                <div class="btn-icon btn-small" id="repeatBtn" role="button" tabindex="0">
                    <span class="material-icons">repeat</span>
                </div>
            </div>
            <div class="volume-inline-container">
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
            </div>
        </div>

        <!-- Playlist Container -->
        <div id="playlist"></div>
    </div>

    <audio id="mainAudio"></audio>

    <script src="app.js"></script>
</body>
    </html>
